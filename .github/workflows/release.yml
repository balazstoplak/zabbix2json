name: release

on:
  # Rolling 'latest' release: runs only AFTER the build workflow succeeds on main.
  workflow_run:
    workflows: ["build"]
    branches: [main]
    types: [completed]
  # Stable releases from version tags (build.yml does not run on tags — no overlap).
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # For the rolling path, only proceed if the build actually passed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/zabbix2json-${os}-${arch}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "$out" .
          done
          cd dist && sha256sum zabbix2json-* > sha256sums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # main passed CI → refresh the rolling 'latest' release at the built commit.
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "Publishing rolling 'latest' release at ${SHA:0:7}"
            gh release delete latest --yes --cleanup-tag 2>/dev/null || true
            gh release create latest dist/* \
              --target "$SHA" \
              --title "latest (continuous build)" \
              --notes "Rolling build from \`main\` @ ${SHA:0:7}, updated on every push to main." \
              --latest
          else
            # Tag push or manual dispatch → stable, named release with notes.
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            echo "Publishing stable release $TAG"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/* --clobber
            else
              gh release create "$TAG" dist/* --title "$TAG" --generate-notes --latest
            fi
          fi
